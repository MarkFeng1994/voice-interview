spring.profiles.active=dev,openai,dashscope,local
spring.application.name=voice-interview-backend
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.media.storage-path=./storage/media
# app.auth.provider=mock
# app.interview.session-store=memory
app.interview.redis-key-prefix=voice-interview:session:
app.interview.session-ttl=2h
app.interview.default-duration-minutes=60
app.interview.max-duration-minutes=120
# app.ai.provider=mock
# app.asr.provider=mock
# app.tts.provider=mock
app.openai.base-url=https://api.openai.com/v1
app.openai.api-key=
app.openai.chat-model=gpt-4o-mini
app.openai.transcription-model=gpt-4o-mini-transcribe
app.openai.speech-model=gpt-4o-mini-tts
app.openai.voice=alloy
app.openai.speech-instructions=Speak like a calm but professional technical interviewer.
app.security.jwt.issuer=voice-interview
app.security.jwt.secret=change-me-before-production-change-me-before-production-1234567890
app.security.jwt.expire-seconds=604800
app.security.ws-ticket-expire-seconds=300
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
