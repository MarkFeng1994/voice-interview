# OpenAI-compatible LLM provider (Spring AI)

app.ai.provider=${APP_AI_PROVIDER:springai}

# Spring AI OpenAI auto-configuration
spring.ai.openai.base-url=${APP_OPENAI_AI_BASE_URL:${APP_OPENAI_BASE_URL:https://api.openai.com/v1}}
spring.ai.openai.api-key=${APP_OPENAI_AI_API_KEY:${APP_OPENAI_API_KEY:}}
spring.ai.openai.chat.options.model=${APP_OPENAI_AI_MODEL:${APP_OPENAI_CHAT_MODEL:gpt-5.4}}
spring.ai.openai.chat.options.temperature=${APP_AI_TEMPERATURE:0.2}

# OpenAI properties for ASR/TTS (not managed by Spring AI)
app.openai.base-url=${APP_OPENAI_BASE_URL:https://api.openai.com/v1}
app.openai.api-key=${APP_OPENAI_API_KEY:}
app.openai.chat-model=${APP_OPENAI_CHAT_MODEL:gpt-4o-mini}
app.openai.transcription-model=${APP_OPENAI_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}
app.openai.speech-model=${APP_OPENAI_SPEECH_MODEL:gpt-4o-mini-tts}
app.openai.voice=${APP_OPENAI_VOICE:alloy}
app.openai.speech-instructions=${APP_OPENAI_SPEECH_INSTRUCTIONS:Speak like a calm but professional technical interviewer.}
